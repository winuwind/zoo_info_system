spring:
  application:
    name: zoo-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/zoo_info_services_db
    username: postgres
    password: Pasha_S_7492
    driver-class-name: org.postgresql.Driver

  jpa:
#    defer-datasource-initialization: true
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        default_schema: public
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        temp:
          use_jdbc_metadata_defaults: false
        order_inserts: true
        order_updates: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    url: jdbc:postgresql://localhost:5432/zoo_info_services_db
    user: postgres
    password: Pasha_S_7492
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: public

  security:
    jwt:
      secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      expiration: 86400000

  jdbc:
    template:
      fetch-size: 100
      max-rows: 1000

server:
  port: 8079
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
      com.zoo: DEBUG
      org.springframework.security: DEBUG
      org.hibernate: WARN
      org.flywaydb: DEBUG